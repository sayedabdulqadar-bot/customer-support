name: Run Baseline Inference

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run baseline inference
      env:
        API_BASE_URL: https://api.openai.com/v1
        MODEL_NAME: gpt-4o-mini
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python inference.py 2>&1 | tee baseline_output.log
      continue-on-error: true
    
    - name: Parse and display results
      if: always()
      run: |
        echo "## 📊 Baseline Inference Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f baseline_output.log ]; then
          echo "### Task Results:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          grep '"event": "END"' baseline_output.log | python3 << 'EOF'
import json
import sys

for line in sys.stdin:
    try:
        data = json.loads(line)
        task_id = data.get('task_id', 'unknown')
        score = data.get('grader_score', 0)
        passed = data.get('grader_passed', False)
        steps = data.get('total_steps', 0)
        
        status = "✅ PASS" if passed else "❌ FAIL"
        print(f"- **{task_id}**: Score `{score:.2%}` {status} ({steps} steps)")
    except json.JSONDecodeError:
        pass
EOF
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          grep '"event": "SUMMARY"' baseline_output.log | python3 << 'EOF'
import json
import sys

for line in sys.stdin:
    try:
        data = json.loads(line)
        avg_score = data.get('average_grader_score', 0)
        tasks_passed = data.get('tasks_passed', 0)
        total_tasks = data.get('total_tasks', 0)
        model = data.get('model', 'unknown')
        
        print(f"- **Model**: {model}")
        print(f"- **Average Score**: {avg_score:.2%}")
        print(f"- **Tasks Passed**: {tasks_passed}/{total_tasks}")
    except json.JSONDecodeError:
        pass
EOF
        else
          echo "⚠️ No baseline output found" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload baseline output
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: baseline-results
        path: baseline_output.log
        retention-days: 30
    
    - name: Comment results on PR
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let comment = '## 📊 Baseline Inference Results\n\n';
          
          try {
            const log = fs.readFileSync('baseline_output.log', 'utf8');
            const lines = log.split('\n');
            
            let hasResults = false;
            const results = [];
            let summary = null;
            
            for (const line of lines) {
              try {
                if (line.includes('"event": "END"')) {
                  const data = JSON.parse(line);
                  results.push({
                    task: data.task_id,
                    score: data.grader_score,
                    passed: data.grader_passed,
                    steps: data.total_steps
                  });
                  hasResults = true;
                } else if (line.includes('"event": "SUMMARY"')) {
                  const data = JSON.parse(line);
                  summary = {
                    avg: data.average_grader_score,
                    passed: data.tasks_passed,
                    total: data.total_tasks,
                    model: data.model
                  };
                }
              } catch (e) {
                // Skip invalid JSON lines
              }
            }
            
            if (hasResults && results.length > 0) {
              comment += '### Task Scores\n\n';
              comment += '| Task | Score | Status | Steps |\n';
              comment += '|------|-------|--------|-------|\n';
              
              for (const r of results) {
                const statusEmoji = r.passed ? '✅' : '❌';
                const scorePercent = (r.score * 100).toFixed(1);
                comment += `| ${r.task} | ${scorePercent}% | ${statusEmoji} | ${r.steps} |\n`;
              }
              
              comment += '\n';
            }
            
            if (summary) {
              comment += '### Summary\n\n';
              comment += `- **Model**: ${summary.model}\n`;
              comment += `- **Average Score**: ${(summary.avg * 100).toFixed(1)}%\n`;
              comment += `- **Tasks Passed**: ${summary.passed}/${summary.total}\n`;
            } else if (!hasResults) {
              comment += '⚠️ No results found. Check the workflow logs.\n';
            }
            
          } catch (e) {
            comment += '⚠️ Could not parse results: ' + e.message + '\n';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
