name: Run Baseline Inference

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run baseline inference
      env:
        API_BASE_URL: https://api.openai.com/v1
        MODEL_NAME: gpt-4o-mini
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python inference.py 2>&1 | tee baseline_output.log
      continue-on-error: true
    
    - name: Parse results and create summary
      if: always()
      run: |
        python3 << 'PYTHON_EOF'
        import json
        import sys
        
        print("## 📊 Baseline Inference Results\n")
        
        try:
          with open('baseline_output.log', 'r') as f:
            lines = f.readlines()
            
          results = []
          summary = None
          
          for line in lines:
            line = line.strip()
            if not line:
              continue
            try:
              if '"event": "END"' in line:
                data = json.loads(line)
                results.append({
                  'task': data.get('task_id', 'unknown'),
                  'score': data.get('grader_score', 0),
                  'passed': data.get('grader_passed', False),
                  'steps': data.get('total_steps', 0)
                })
              elif '"event": "SUMMARY"' in line:
                summary = json.loads(line)
            except json.JSONDecodeError:
              pass
          
          if results:
            print("### Task Scores\n")
            print("| Task | Score | Status | Steps |")
            print("|------|-------|--------|-------|")
            for r in results:
              status = "✅" if r['passed'] else "❌"
              score_pct = f"{r['score']*100:.1f}%"
              print(f"| {r['task']} | {score_pct} | {status} | {r['steps']} |")
            print()
          
          if summary:
            print("### Summary\n")
            print(f"- **Model**: {summary.get('model', 'unknown')}")
            print(f"- **Average Score**: {summary.get('average_grader_score', 0)*100:.1f}%")
            print(f"- **Tasks Passed**: {summary.get('tasks_passed', 0)}/{summary.get('total_tasks', 0)}")
          elif not results:
            print("⚠️ No results found. Check logs below.\n")
            
        except Exception as e:
          print(f"⚠️ Error parsing results: {e}\n")
        
        PYTHON_EOF
        
    - name: Upload baseline output
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: baseline-results
        path: baseline_output.log
        retention-days: 30
